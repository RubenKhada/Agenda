<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Doctor - Pediatría Integral Satélite</title>
    <link rel="stylesheet" href="registro-styles.css">
</head>
<body>

    <div class="container">
        <div class="image-section">
            <div class="image-overlay">
                <h2>Registro Médico</h2>
                <p>Solo personal autorizado puede registrarse.</p>
            </div>
        </div>

        <div class="form-section">
            <h2>Registro de Doctor</h2>
            
            <form id="registroDoctorForm" action="../api/registro-doctor.php" method="POST">
                
                <div class="input-group">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>

                <div class="input-group">
                    <label for="email">Correo institucional</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="input-group">
                    <label for="cedula">Cédula profesional</label>
                    <input type="text" id="cedula" name="cedula" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="input-group">
                    <label for="master_key">Código de registro *</label>
                    <input type="password" id="master_key" name="master_key" required placeholder="Contraseña maestra">
                    <small style="color:#777;">Solo personal autorizado</small>
                </div>

                <button type="submit" class="btn-login">Registrarse</button>

                <div class="footer-text">
                    <a href="login-doctor.html">← Volver a login</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('registroDoctorForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            
            fetch('../api/registro-doctor.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('✅ Registro exitoso. Ahora puedes iniciar sesión.');
                    window.location.href = 'login-doctor.html';
                } else {
                    alert('❌ ' + data.message);
                }
            })
            .catch(() => alert('Error de conexión'));
        });
    </script>
</body>
</html>
